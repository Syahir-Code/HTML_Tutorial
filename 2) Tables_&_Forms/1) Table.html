
<!-- border: table attribute, creates border -->
<table border="1">
    <!-- <tr>: table row  -->
    <!-- row first, then column -->
    <tr> <!-- Row1 -->
        <!-- <td>: table data (table column) -->
        <td>Name</td> <td>Age</td> 
        <!-- Column1: Name, Column2: Age -->
    
    </tr>

    <tr> <!-- Row2 -->
        <td>John</td> <td>23</td>
    </tr>

    <tr>
        <td>Tom</td> <td>20</td>
    </tr>

</table>
